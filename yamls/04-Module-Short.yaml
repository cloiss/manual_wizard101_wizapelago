# Q. What is this file?
# A. This file contains options which allow you to configure your multiworld experience while allowing
#    others to play how they want as well.
#
# Q. How do I use it?
# A. The options in this file are weighted. This means the higher number you assign to a value, the
#    more chances you have for that option to be chosen. For example, an option like this:
#
#    map_shuffle:
#      on: 5
#      off: 15
#
#    Means you have 5 chances for map shuffle to occur, and 15 chances for map shuffle to be turned
#    off.
#
# Q. I've never seen a file like this before. What characters am I allowed to use?
# A. This is a .yaml file. You are allowed to use most characters.
#    To test if your yaml is valid or not, you can use this website:
#        http://www.yamllint.com/
#    You can also verify that your Archipelago options are valid at this site:
#        https://archipelago.gg/check

# Your name in-game, limited to 16 characters.
#     {player} will be replaced with the player's slot number.
#     {PLAYER} will be replaced with the player's slot number, if that slot number is greater than 1.
#     {number} will be replaced with the counter value of the name.
#     {NUMBER} will be replaced with the counter value of the name, if the counter value is greater than 1.
name: Wizard{number}

# Used to describe your yaml. Useful if you have multiple files.
description: Recommended yaml for a short, introductory game, with Harvest Lord as the goal. 

game: Manual_Wizard101_Cloiss
requires:
  version: 0.6.7 # Version of Archipelago required for this yaml to work as expected.

Manual_Wizard101_Cloiss:
  ################
  # Game Options #
  ################
  progression_balancing:
    # A system that can move progression earlier, to try and prevent the player from getting stuck and bored early.
    # 
    # A lower setting means more getting stuck. A higher setting means less getting stuck.
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 0
    # Maximum value is 99
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-0-99: 0 # random value between 0 and 99
    disabled: 0 # equivalent to 0
    normal: 0 # equivalent to 50
    extreme: 0 # equivalent to 99
    70: 50

  accessibility:
    # Set rules for reachability of your items/locations.
    # 
    # **Full:** ensure everything can be reached and acquired.
    # 
    # **Minimal:** ensure what is needed to reach your goal can be acquired.
    full: 50
    minimal: 0

  goal:
    # Set which boss must be defeated to complete the randomizer. If an unreachable boss is chosen, generation will fail.
    defeat lord nightshade: 0
    defeat general akilles: 0
    defeat harvest lord: 50
    defeat roberto: 0
    defeat alicane swiftarrow: 0
    defeat melweena smite: 0
    defeat foulgaze: 0

  ##########
  # School #
  ##########
  primary_school:
    # Select your wizard's primary school. Choose 'random-school' to select a school at random with equal odds.
    balance: 20
    storm: 0
    ice: 0
    fire: 0
    death: 20
    myth: 0
    life: 20
    random-school: 0

  secondary_school:
    # Select your wizard's secondary school. If you choose the same school as the primary, a different school will be chosen at random. Choose 'any' to allow yourself to pick a secondary school during the game. This will cause secondary spell items to appear as e.g. 'Secondary L1'.
    balance: 0
    storm: 50
    ice: 0
    fire: 0
    death: 0
    myth: 0
    life: 0
    random-school: 0
    any: 0

  ##########################
  # Special Item Locations #
  ##########################
  mark_location:
    # Ensures the Teleport-Mark ability is given at the start or prior to various checkpoints. Mid-streets refers to the Cyclops/Fodder/Bubbles, Harvest Lord/Nexus, and Fodder/Bastilla quests.
    start: 50
    rattlebones: 0
    muldoon: 0
    mid-streets: 0
    anywhere: 0

  mount_location:
    # Ensures the Slot-Mount ability is given at the start or prior to various checkpoints. Mid-streets refers to the Cyclops/Fodder/Bubbles, Harvest Lord/Nexus, and Fodder/Bastilla quests. Placing this at Mid-Streets or Anywhere is extremely not recommended.
    start: 50
    rattlebones: 0
    muldoon: 0
    mid-streets: 0
    anywhere: 0

  rank_2_spell_location:
    # Guarantee at least one rank 2 spell prior to various checkpoints. Mid-streets refers to the Cyclops/Fodder/Bubbles, Harvest Lord/Nexus, and Fodder/Bastilla quests.
    rattlebones: 0
    muldoon: 50
    mid-streets: 0
    anywhere: 0

  teleport_button_location:
    # Guarantee at least one World/Commons/Home teleport buttons prior to various checkpoints. Mid-streets refers to the Cyclops/Fodder/Bubbles, Harvest Lord/Nexus, and Fodder/Bastilla quests.
    rattlebones: 0
    muldoon: 50
    mid-streets: 0
    anywhere: 0

  ######################
  # Starting Inventory #
  ######################
  start_vendor_library:
    # Start with Vendor-Library, allowing you to purchase any Treasure Cards you receive as items. Recommended ON for a more fun experience.
    'false': 0
    'true': 50

  start_vendor_potions:
    # Start with Vendor-Potions, recommended for beginners for ease of play.
    'false': 50
    'true': 0

  start_all_vendors:
    # Start with all vendors. Use this option when there are too many items in the pool. This removes about 17 items.
    'false': 0
    'true': 50

  start_teleport_dungeon:
    # Start with Teleport-Dungeon (dungeon recall), making retrying bosses and towers easier and allowing Flee Strats. All multi-floor towers expect you to find this item before attempting the higher floors.
    'false': 0
    'true': 50

  start_all_teleports:
    # Start with all teleports. Use this option for a faster and more streamlined game. This removes about 7 items.
    'false': 50
    'true': 0

  start_thunder_snake:
    # Start with ItemCard-Thunder Snake, making the earlygame easier and faster. Recommended for beginners.
    'false': 50
    'true': 0

  start_pixie:
    # Start with SpellCard-Pixie, allowing a guaranteed safety net in fights. Recommended for beginners.
    'false': 50
    'true': 0

  start_primary_rank_1:
    # Start with your primary school's rank 1 Spell Card. Highly recommended.
    'false': 0
    'true': 50

  start_primary_rank_2:
    # Start with your primary school's rank 2 Spell Card. This option is mostly for future use with higher-level randomizers, as using it for Wizard City may result in a less interesting game.
    'false': 50
    'true': 0

  start_rank_1_item_cards:
    # Start with the specified number of rank 1 item cards (not including Thunder Snake, if chosen above), for use with the default wand. Recommended 3.
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 0
    # Maximum value is 7
    3: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-0-7: 0 # random value between 0 and 7

  #########
  # Logic #
  #########
  friendly_teleport:
    # Enables Friendly Teleports in logic and grants access to them in the starting inventory. Enabling this creates a more varied earlygame (pre-Rattlebones).
    'false': 50
    'true': 0

  beginner_logic:
    # Enable this setting to disable unintuitive logic (e.g. going to Triton Avenue to defeat the Rotting Fodder in the Firecat Alley main quest)
    'false': 50
    'true': 0

 ###################
  # Check Locations #
  ###################
  reagents:
    # Adds locations for collecting reagents in Wizard City. Select 'anywhere' to add one location per reagent type (6 locations). Select 'anywhere-ore' to only add the Ore location, which has the most interesting access logic. Select 'all' to add reagent locations per area: Unicorn Way, Commons, Ravenwood, Shopping District, Olde Town, Cyclops Lane, Triton Avenue, Haunted Cave, Firecat Alley, and Dark Cave. (Adds up to 26 locations)
    none: 0
    anywhere: 50
    anywhere-ore: 0
    all: 0

  housing_items:
    # Adds a location for each Housing Item you can pick up in Wizard City, adding up to 5 locations.
    'false': 50
    'true': 0

  wooden_chests:
    # Adds locations for wooden chests in Wizard City. Select 'anywhere' to add one wooden chest location, or 'all' to add wooden chest locations for Unicorn Way, Triton Avenue, Firecat Alley, Cyclops Lane, Haunted Cave, and Dark Cave.
    none: 0
    anywhere: 0
    all: 50

  silver_chests:
    # Adds locations for silver chests in Wizard City. Select 'anywhere' to add one silver chest location, or 'all' to add silver chest locations for Triton Avenue, Firecat Alley, and Cyclops Lane.
    none: 50
    anywhere: 0
    all: 0

  find_the_smiths:
    # Adds locations for finding each of the Smiths in Prospector Zeke's quest 'Find the Smiths'. (Adds 5-9 locations)
    none: 0
    all: 50

  find_the_books:
    # Adds locations for reading books. Select 'bosses' to include only books from Boris Tallstaff's quest 'The Lore You Know' (2-6 locations) or 'all' to add ALL books (up to 21 locations).
    none: 0
    bosses: 50
    all: 0

  halloween:
    # Adds a location for each Halloween-exclusive quest (plus apprentice tower), adding about 20 locations and 13 items.
    'false': 50
    'true': 0

  ###########
  # Modules #
  ###########
  module_golemcourt:
    # Half module includes Golem Court, full module includes Golem Court and Golem Tower. Default full, adds about 1-2 items and 4-8 locations.
    none: 50
    half: 0
    full: 0

  module_cyclops:
    # Half module includes everything up to Eyus, full module includes everything in Cyclops. Default full, adds about 2-5 items and 8-15 locations.
    none: 0
    half: 50
    full: 0

  module_triton:
    # Half module includes Kraken and Skullsplitter, full module includes everything in Triton. Default full, adds about 3-6 items and 8-19 locations.
    none: 0
    half: 0
    full: 50

  module_firecat:
    # Half module includes Larry and Wormguts, full module includes everything in Firecat. Default full, adds about 3-7 items and 9-14 locations.
    none: 50
    half: 0
    full: 0

  module_poststreets:
    # Includes everything made available after either one or all three streets are completed, adding about 1-3 items and 12-14 locations.
    none: 50
    full: 0

  module_lostpages:
    # Includes quests that are part of the Lost Pages event, adding about 1 item and 5 locations.
    none: 50
    full: 0

  ###########################
  # Item & Location Options #
  ###########################
  local_items:
    # Forces these items to be in their native world.
    []

  non_local_items:
    # Forces these items to be outside their native world.
    []

  start_inventory:
    # Start with the specified amount of these items. Example: "Bomb: 1"
    {}

  start_inventory_from_pool:
    # Start with the specified amount of these items and don't place them in the world. Example: "Bomb: 1"
    # 
    # The game decides what the replacement items will be.
    {}

  start_hints:
    # Start with these item's locations prefilled into the ``!hint`` command.
    []

  start_location_hints:
    # Start with these locations and their item prefilled into the ``!hint`` command.
    ["Regina: The Final Piece (Iron Golem)","Pierre: The Power is Ours (Fears)","Lucky: Fishful Thinking (Fishing 2)","Hallow: Baron of Nightmares (Baron Mordecai)"]

  exclude_locations:
    # Prevent these locations from having an important item.
    ["Reagent: Rare Reagent (Anywhere)","Lucky: Fishful Thinking (Fishing 2)","Hallow: Baron of Nightmares (Baron Mordecai)"]

  priority_locations:
    # Prevent these locations from having an unimportant item.
    []

  item_links:
    # Share part of your item pool with other players.
    []

  plando_items:
    # Generic items plando.
    []
